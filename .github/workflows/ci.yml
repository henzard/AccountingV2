name: CI

on:
  push:
    branches: ['*']
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prettier format check
        run: npm run format:check

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 0

      - name: Jest
        run: npx jest --coverage

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: 'v1.x'

      - name: Run Deno tests
        run: deno test --allow-net --allow-env --allow-read supabase/functions/

  e2e-android:
    if: github.ref == 'refs/heads/master'
    runs-on: macos-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install JS dependencies
        run: npm ci

      - name: Install Detox CLI
        run: npm install -g detox-cli

      - name: Build debug APK
        run: detox build --configuration android.emu.debug

      - name: Run Detox tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          avd-name: Pixel_6_API_34
          disable-animations: true
          emulator-options: -no-snapshot-save -noaudio -no-boot-anim -gpu swiftshader_indirect
          script: |
            adb wait-for-device
            adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
            adb shell input keyevent 82
            detox test --configuration android.emu.debug --headless --loglevel warn
