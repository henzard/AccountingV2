name: CI

on:
  push:
    branches: ['*']
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prettier format check
        run: npm run format:check

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 0

      - name: Jest
        run: npx jest --coverage

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: 'v1.x'

      - name: Run Deno tests
        run: deno test --allow-net --allow-env --allow-read supabase/functions/

  e2e-android:
    # Detox config is currently scaffolded (specs use describe.skip); the build/test
    # steps require a real emulator + a proper detoxrc.build script. Keeping the
    # job defined so the scaffold lives in CI, but non-blocking until real E2E
    # infrastructure is set up. Re-enable by removing continue-on-error once the
    # .detoxrc.js apps.*.build script is wired.
    if: github.ref == 'refs/heads/master'
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - run: npm ci
      - run: npm install -g detox-cli
      - run: detox build --configuration android.emu.release
      - run: detox test --configuration android.emu.release
