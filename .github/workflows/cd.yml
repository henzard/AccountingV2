name: CD — Google Play Internal Testing

on:
  push:
    branches: [master]

jobs:
  ci-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 0

      - name: Jest
        run: npx jest --coverage

  build-and-publish:
    needs: ci-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Compute versionName
        id: vname
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "name=1.1.${{ github.run_number }}+${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease -PversionCode=${{ github.run_number }} -PversionName=${{ steps.vname.outputs.name }} --no-daemon
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          # EXPO_PUBLIC_* values are bundled into the client by design (protected by RLS).
          # Without these, app.config.ts extra.supabaseUrl/supabaseAnonKey are undefined
          # and supabaseClient.ts throws at module eval → app crashes on launch.
          EXPO_PUBLIC_SUPABASE_URL: https://qmfsobqpnogefvzltwyj.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_Rk3QUD3vehZPVPuoWx-RRg_k5oM47l5

      - name: Check Firebase secrets
        id: firebase_check
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          if [ -n "$SA_JSON" ]; then
            echo "has_sa=true" >> $GITHUB_OUTPUT
          else
            echo "has_sa=false" >> $GITHUB_OUTPUT
          fi
          if [ -n "$SA_JSON" ] && [ -n "$PROJECT_ID" ]; then
            echo "has_both=true" >> $GITHUB_OUTPUT
          else
            echo "has_both=false" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to Google Cloud
        if: steps.firebase_check.outputs.has_sa == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Set up gcloud CLI
        if: steps.firebase_check.outputs.has_sa == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Build release APK for Firebase Test Lab
        if: steps.firebase_check.outputs.has_sa == 'true'
        working-directory: android
        run: ./gradlew assembleRelease -PversionCode=${{ github.run_number }} -PversionName=${{ steps.vname.outputs.name }} --no-daemon
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          EXPO_PUBLIC_SUPABASE_URL: https://qmfsobqpnogefvzltwyj.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_Rk3QUD3vehZPVPuoWx-RRg_k5oM47l5

      - name: Firebase Test Lab — Robo smoke test
        if: steps.firebase_check.outputs.has_both == 'true'
        # DECISION: continue-on-error kept until toolresults.googleapis.com is confirmed
        # enabled in GCP Console → APIs & Services → Cloud Tool Results API.
        # Once enabled, remove continue-on-error to make this a hard gate.
        continue-on-error: true
        run: |
          gcloud firebase test android run \
            --type robo \
            --app android/app/build/outputs/apk/release/app-release.apk \
            --device model=oriole,version=33,locale=en,orientation=portrait \
            --timeout 90s \
            --project ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Upload Crashlytics mapping file
        # uploadCrashlyticsSymbolFileRelease only exists when NDK/native code is present.
        # uploadCrashlyticsMappingFileRelease only exists when minification is enabled.
        # Neither applies to this project, so skip entirely for now.
        # Re-enable if NDK or R8 minification is added in a future phase.
        if: false
        working-directory: android
        run: |
          ./gradlew uploadCrashlyticsMappingFileRelease

      - name: Upload to Play Store — Internal Testing
        # Pinned to v1 tag commit SHA for supply-chain security (C11)
        uses: r0adkll/upload-google-play@935ef9c68bb393a8e6116b1575626a7f5be3a7fb
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.henza.accountingv2
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
          inAppUpdatePriority: 2
